<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #1d4ed8;
      color: #fff;
      padding: 18px 24px 14px;
    }
    header h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    header p { font-size: 13px; opacity: 0.85; }

    .container { max-width: 960px; margin: 0 auto; padding: 16px; }

    .controls {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .controls label { font-size: 13px; color: #555; font-weight: 500; }
    .filter-btn {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { background: #f1f5f9; }
    .filter-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .filter-btn.active-red { background: #dc2626; color: #fff; border-color: #dc2626; }

    .legend {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-left: auto;
      font-size: 13px;
      color: #555;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot-toko { background: #2563eb; border: 1.5px solid #1d4ed8; }
    .dot-infra { background: #dc2626; border: 1.5px solid #991b1b; }

    #count { font-size: 12px; color: #888; width: 100%; }

    #map {
      width: 100%;
      height: 520px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      z-index: 0;
    }

    .sidebar {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      padding: 14px 16px;
      margin-top: 12px;
    }
    .sidebar h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #1e293b; }
    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 6px;
    }
    .list-item {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .list-item:hover { background: #eff6ff; border-color: #93c5fd; }
    .list-item .dot { flex-shrink: 0; }
    .list-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    footer { text-align: center; font-size: 12px; color: #aaa; padding: 16px; }

    @media (max-width: 600px) {
      header h1 { font-size: 15px; }
      #map { height: 380px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Peta Studi Kasus — Kawasan Jl. Kapten Piere Tendean, Wirobrajan</h1>
  <p>Yogyakarta &nbsp;|&nbsp; Klik titik di peta untuk detail lokasi</p>
</header>

<div class="container">

  <div class="controls">
    <label>Filter:</label>
    <button class="filter-btn active" onclick="filterMap('all',this)">Semua</button>
    <button class="filter-btn" onclick="filterMap('toko',this)">Toko &amp; Usaha</button>
    <button class="filter-btn" onclick="filterMap('infra',this)">⚠️ Infrastruktur Bermasalah</button>
    <div class="legend">
      <div class="legend-item"><span class="dot dot-toko"></span> Toko / Usaha</div>
      <div class="legend-item"><span class="dot dot-infra"></span> Infrastruktur bermasalah</div>
    </div>
    <div id="count"></div>
  </div>

  <div id="map"></div>

  <div class="sidebar">
    <h2>Daftar Lokasi</h2>
    <div class="list-grid" id="list"></div>
  </div>

</div>

<footer>Studi Kasus Kawasan Jalan Kapten Piere Tendean, Wirobrajan &mdash; Data Koordinat Lapangan</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const infraData = [
  {nama:"Drainase tertutup tanah (depan toko anantari)",lat:-7.804522360434492,lng:110.3509946137159,cat:"infra",detail:"Drainase di depan toko anantari wirobrajan tertutup tanah"},
  {nama:"Drainase banyak sampah & dangkal (depan indomaret)",lat:-7.804436660436792,lng:110.35100936586514,cat:"infra",detail:"Drainase depan indomaret juga banyak sampah dan dangkal"},
  {nama:"Drainase tersumbat (Jl. Ontosena, tugu kampung)",lat:-7.802265881926273,lng:110.35148424684972,cat:"infra",detail:"Drainase di depan tugu kampung wirobrajan jalan ontosena tersumbat"},
  {nama:"Tiang listrik di tengah trotoar (SMA Muh. 7)",lat:-7.801186785748941,lng:110.35170209510996,cat:"infra",detail:"Tiang listrik di samping SMA Muhammadiyah 7 Yogyakarta di tengah trotoar + kabel berantakan di trotoar"},
  {nama:"Pipa terbuka di trotoar (samping SMA Muh. 7)",lat:-7.801502228133155,lng:110.3516155659361,cat:"infra",detail:"Ada pipa yang terbuka dan menjalar di trotoar samping SMA Muhammadiyah 7 Yogyakarta"},
  {nama:"Drainase tersumbat sampah organik (depan S.W.R.N custom)",lat:-7.803978338985276,lng:110.35121467977379,cat:"infra",detail:"Drainase tersumbat sampah organik (daun) di depan S.W.R.N custom"},
];

const allData = [...tokoData, ...infraData];
let map, markers = [];

function makeStyle(cat) {
  return {
    radius: cat === 'infra' ? 9 : 7,
    fillColor: cat === 'infra' ? '#dc2626' : '#2563eb',
    color: cat === 'infra' ? '#991b1b' : '#1d4ed8',
    weight: 1.5,
    opacity: 1,
    fillOpacity: 0.85
  };
}

function updateCount() {
  const n = markers.filter(m => m._visible).length;
  document.getElementById('count').textContent = `Menampilkan ${n} dari ${allData.length} titik`;
}

function filterMap(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','active-red'));
  btn.classList.add(type === 'infra' ? 'active-red' : 'active');
  markers.forEach(m => {
    const show = type === 'all' || m._cat === type;
    m._visible = show;
    if (show) m.addTo(map); else map.removeLayer(m);
  });
  // update list
  renderList(type);
  updateCount();
}

function flyTo(lat, lng) {
  map.flyTo([lat, lng], 19, {animate: true, duration: 0.8});
  const m = markers.find(mk => mk._lat === lat && mk._lng === lng);
  if (m) m.openPopup();
}

function renderList(filter) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  allData.forEach(d => {
    if (filter && filter !== 'all' && d.cat !== filter) return;
    const el = document.createElement('div');
    el.className = 'list-item';
    el.innerHTML = `<span class="dot ${d.cat==='infra'?'dot-infra':'dot-toko'}"></span><span title="${d.nama}">${d.nama}</span>`;
    el.onclick = () => flyTo(d.lat, d.lng);
    list.appendChild(el);
  });
}

window.onload = () => {
  map = L.map('map').setView([-7.8035, 110.3512], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  allData.forEach(d => {
    const m = L.circleMarker([d.lat, d.lng], makeStyle(d.cat)).addTo(map);
    const badge = d.cat === 'infra' ? '⚠️ Infrastruktur bermasalah' : '📍 Toko / Usaha';
    const detail = d.detail ? `<br><span style="font-size:12px;color:#444">${d.detail}</span>` : '';
    m.bindPopup(`
      <b style="font-size:13px">${d.nama}</b><br>
      <span style="font-size:11px;color:#777">${badge}</span>${detail}<br>
      <span style="font-size:11px;color:#aaa">${d.lat.toFixed(6)}, ${d.lng.toFixed(6)}</span>
    `);
    m._cat = d.cat;
    m._lat = d.lat;
    m._lng = d.lng;
    m._visible = true;
    markers.push(m);
  });

  renderList('all');
  updateCount();
};
</script>
